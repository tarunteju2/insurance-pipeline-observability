global:
  scrape_interval: 10s
  evaluation_interval: 10s

# Alert rules configuration
rule_files:
  - '/etc/prometheus/alert_rules.yml'

# Alertmanager configuration (will be configured separately for production)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: 'observability-api'
    static_configs:
      - targets: ['observability-api:8080']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'pipeline-metrics'
    static_configs:
      - targets: ['host.docker.internal:8001']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 10s